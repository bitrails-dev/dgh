name: Build & Deploy

on:
  push:
    branches: [main]
  # Decap CMS commits content changes to main — this re-triggers the build
  # automatically on every save, no manual action required.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_SITE: ${{ vars.PUBLIC_SITE || 'https://dgh.bitrails.dev' }}

      # ── Deploy to GitHub Pages ──────────────────────────────────────────────
      # Enable Pages in repo Settings → Pages → Source: GitHub Actions
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
