<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B3F6E"/>
      <stop offset="100%" style="stop-color:#2A5A9E"/>
    </linearGradient>
    <pattern id="stripes" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="16" height="32" fill="rgba(255,255,255,0.03)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#stripes)"/>

  <!-- Accent bar top -->
  <rect y="0" width="1200" height="8" fill="#D4A843"/>

  <!-- Hospital cross mark -->
  <rect x="80" y="180" width="56" height="200" rx="10" fill="#D4A843"/>
  <rect x="20" y="240" width="176" height="80" rx="10" fill="#D4A843"/>

  <!-- Title -->
  <text x="240" y="280" font-family="Cairo, Arial, sans-serif" font-size="72" font-weight="800" fill="white">مستشفى النور العام</text>
  <text x="240" y="360" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="600" fill="rgba(255,255,255,0.75)">Al Noor Public Hospital</text>

  <!-- Tagline -->
  <text x="240" y="430" font-family="Cairo, Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.55)">منارة وطنية للتميز في الصحة العامة</text>

  <!-- Bottom accent -->
  <rect y="622" width="1200" height="8" fill="rgba(212,168,67,0.4)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="100" r="200" fill="rgba(212,168,67,0.05)"/>
  <circle cx="1050" cy="520" r="120" fill="rgba(255,255,255,0.04)"/>
</svg>
